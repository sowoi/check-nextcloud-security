# Example inventory for the check-nextcloud-security Ansible playbooks.
#
# Copy this file, rename it (e.g. inventory.ini), and adjust hosts/variables
# for your environment. Each host is an Icinga2 server that will run the
# check-nextcloud-security plugin - it does NOT need to be the Nextcloud
# server itself.
#
# nextcloud_check_host is the Nextcloud instance to scan and is normally
# different from the Ansible target host.

[icinga_targets]
icinga01.example.com nextcloud_check_host=nextcloud1.example.com
icinga02.example.com nextcloud_check_host=nextcloud2.example.com nextcloud_check_proxy=http://proxy.example.com:3128

[icinga_targets:vars]
ansible_user=ansible
# ansible_become_password=changeme   # or use --ask-become-pass / vault
