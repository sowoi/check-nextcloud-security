---
# Deploys check-nextcloud-security as a Docker container and configures it
# as an Icinga2 CheckCommand/Service on each target host.
#
# Requires Docker Engine to already be installed on the target hosts, and
# the community.docker collection installed locally:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook -i inventory.ini playbooks/deploy_docker.yml
#
# See ansible/README.md for variable reference and prerequisites.
- name: Deploy check-nextcloud-security (Docker)
  hosts: icinga_targets
  become: true
  roles:
    - role: nextcloud_check_docker
